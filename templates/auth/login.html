{% extends "base.html" %}
{% block title %}Вход — VPN Prime{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card bg-dark-subtle border-secondary shadow">
      <div class="card-body p-4">
        <h4 class="card-title text-center mb-4">
          <i class="bi bi-shield-lock-fill text-primary me-2"></i>VPN Prime
        </h4>
        <h5 class="text-center mb-4 text-secondary">Вход в аккаунт</h5>

        <form method="post" action="/auth/login">
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control bg-dark text-light border-secondary"
                   placeholder="you@example.com" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label">Пароль</label>
            <input type="password" name="password" class="form-control bg-dark text-light border-secondary"
                   placeholder="••••••" required>
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-primary">Войти</button>
          </div>
        </form>

        <hr class="border-secondary my-3">

        <div class="text-center small">
          <a href="/auth/forgot-password" class="text-secondary text-decoration-none">Забыли пароль?</a>
          <span class="text-muted mx-2">|</span>
          <a href="/auth/register" class="text-primary text-decoration-none">Регистрация</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
