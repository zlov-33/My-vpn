{% extends "base.html" %}
{% block title %}Сброс пароля — VPN Prime{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-5 col-lg-4">
    <div class="card bg-dark-subtle border-secondary shadow">
      <div class="card-body p-4">
        <h4 class="card-title text-center mb-4">
          <i class="bi bi-key-fill text-warning me-2"></i>Сброс пароля
        </h4>

        {% if mode == 'forgot' %}
          <p class="text-secondary small mb-4">Введите email, и мы отправим ссылку для сброса пароля.</p>
          <form method="post" action="/auth/forgot-password">
            <div class="mb-3">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control bg-dark text-light border-secondary"
                     placeholder="you@example.com" required autofocus>
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-warning">Отправить ссылку</button>
            </div>
          </form>

        {% elif mode == 'reset' %}
          <p class="text-secondary small mb-4">Введите новый пароль.</p>
          <form method="post" action="/auth/reset-password">
            <input type="hidden" name="token" value="{{ token }}">
            <div class="mb-3">
              <label class="form-label">Новый пароль</label>
              <input type="password" name="password"
                     class="form-control bg-dark text-light border-secondary"
                     placeholder="Минимум 6 символов" required autofocus>
            </div>
            <div class="mb-3">
              <label class="form-label">Подтверждение пароля</label>
              <input type="password" name="password_confirm"
                     class="form-control bg-dark text-light border-secondary"
                     placeholder="Повторите пароль" required>
            </div>
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-warning">Сохранить пароль</button>
            </div>
          </form>
        {% endif %}

        <hr class="border-secondary my-3">
        <div class="text-center small">
          <a href="/auth/login" class="text-secondary text-decoration-none">Вернуться к входу</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
